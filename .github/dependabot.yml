# Dependabot configuration per ADR-0012.
#
# Component 1: npm dependency updates (security + version), recursive across
# the pnpm workspace so apps/api, apps/web, and packages/shared all get
# scanned. Weekly cadence to keep noise manageable in Phase 0.
#
# Component 4 of ADR-0012 (action SHA pinning): the github-actions ecosystem
# below opens weekly PRs that bump the SHA pins in .github/workflows/*.yml.

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Kathmandu
    open-pull-requests-limit: 5
    # Supply-chain cooldown (semgrep dependabot-missing-cooldown, ADR-0012
    # baseline): wait 7 days before proposing newly published versions -
    # brand-new releases are where compromised-package incidents live.
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      typescript:
        patterns:
          - typescript
          - typescript-eslint
          - "@typescript-eslint/*"
      nestjs:
        patterns:
          - "@nestjs/*"
      nextjs:
        patterns:
          - next
          - "@next/*"
          - react
          - react-dom
          - "@types/react*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - postcss
      prisma:
        patterns:
          - prisma
          - "@prisma/*"
      linting:
        patterns:
          - eslint
          - "@eslint/*"
          - prettier
          - eslint-config-*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Kathmandu
    open-pull-requests-limit: 3
    # Supply-chain cooldown (semgrep dependabot-missing-cooldown, ADR-0012
    # baseline): wait 7 days before proposing newly published versions -
    # brand-new releases are where compromised-package incidents live.
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)
      include: scope

  # Component 1 (cont.): the standalone driver mobile app (apps-mobile/driver)
  # is OUTSIDE the pnpm workspace (ADR-0033), so the recursive npm scan at "/"
  # does not reach it. It gets its own ecosystem entry so its lockfile is not a
  # dependency-update / security blind spot (ADR-0012). Expo SDK bumps are
  # grouped so a coordinated upgrade arrives as one PR.
  - package-ecosystem: npm
    directory: /apps-mobile/driver
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Kathmandu
    open-pull-requests-limit: 5
    # Supply-chain cooldown (semgrep dependabot-missing-cooldown, ADR-0012
    # baseline): wait 7 days before proposing newly published versions -
    # brand-new releases are where compromised-package incidents live.
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      expo:
        patterns:
          - expo
          - "expo-*"
          - react-native
          - "@expo/*"
      jest:
        patterns:
          - jest
          - jest-expo
          - "@jest/*"
          - "@types/jest"
      linting:
        patterns:
          - eslint
          - "eslint-config-*"

  # Component 1 (cont.): the orchestration loop (scripts/orchestration) is a
  # standalone pnpm package OUTSIDE the workspace with its own lockfile, so
  # the recursive npm scan at "/" does not reach it. Without this block it
  # received only security PRs (with default `build(deps-dev)` prefixes —
  # see PR #107), never version updates: the structural cause of its 2026-07
  # 14-alert backlog. NOTE: no CI job runs this package's tests — verify its
  # update PRs locally (`pnpm test` / `pnpm typecheck` in the directory)
  # before merging, per docs/runbook/orchestration-loop-operator-guide.md.
  - package-ecosystem: npm
    directory: /scripts/orchestration
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Kathmandu
    open-pull-requests-limit: 5
    # Supply-chain cooldown (semgrep dependabot-missing-cooldown, ADR-0012
    # baseline): wait 7 days before proposing newly published versions -
    # brand-new releases are where compromised-package incidents live.
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      test-stack:
        patterns:
          - vitest
          - "@vitest/*"
          - vite
      anthropic:
        patterns:
          - "@anthropic-ai/*"
      slack:
        patterns:
          - "@slack/*"
