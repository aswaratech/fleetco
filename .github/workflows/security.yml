name: security

on:
  push:
    branches: [main]
  pull_request:

# ADR-0012 security baseline:
#   - Component 1 (Dependabot npm alerts + automatic security PRs): enabled at
#     repository settings level (see .github/dependabot.yml for update schedule).
#   - Component 2 (GitHub native secrets scanning): enabled at repository
#     settings level. Repo-level scanning unavailable at Free tier per active
#     tech-debt entry; user-level push protection is free and on by default.
#   - Component 3 (Semgrep OWASP + security-audit): the job below.
#   - Component 4 (Action SHA pinning): all third-party actions are SHA-pinned
#     in this repo's workflow files; Dependabot's github-actions ecosystem
#     proposes SHA updates weekly.
#   - Component 5 (CycloneDX SBOM): SHIPPED in ci.yml's `push-images` job
#     (deploy-prep T3). On every push to `main` a CycloneDX SBOM is generated per
#     production image (api, web) with anchore/sbom-action and uploaded as a
#     workflow artifact. ADR-0014 §7 resolved the original ADR-0012 deferral here
#     and refined the SBOM from the npm-workspace sketch to a per-image scan
#     (broader coverage: OS packages + the bundled node deps). Intentionally NOT
#     on PR-time CI — the SBOM scans the built+published image, which only happens
#     on the push-to-main path; PRs build the images (ci.yml `build-images`) but
#     do not publish, so there is nothing to SBOM there.

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep (OWASP + security-audit)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Semgrep scan
        run: semgrep ci --config p/owasp-top-ten --config p/security-audit
