name: ci

on:
  push:
    branches: [main]
  pull_request:

# Pinned action SHAs per ADR-0012 component 4 (action-version pinning).
# Dependabot's github-actions ecosystem (see .github/dependabot.yml) opens
# weekly PRs to bump these SHAs.
permissions:
  contents: read

jobs:
  ci:
    name: lint + format + typecheck + tests
    runs-on: ubuntu-latest
    # Postgres service for the API test suite. See ADR-0023 §6 for the
    # database-strategy rationale. The official postgis/postgis image is
    # used here (amd64-only, which matches GitHub Actions runners); the
    # local dev compose uses imresamu/postgis instead because that image
    # is multi-arch. The two images publish compatible 16-3.5 builds, so
    # the schema and migrations are identical in CI and locally.
    services:
      postgres:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_USER: fleetco
          POSTGRES_PASSWORD: fleetco
          POSTGRES_DB: fleetco_test
        ports:
          - 5432:5432
        # Health check matches docker-compose.yml's pg_isready pattern so
        # subsequent steps wait until Postgres is ready to accept
        # connections before they try.
        options: >-
          --health-cmd "pg_isready -U fleetco -d fleetco_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Redis service for the API test suite. Until now no test touched a
      # live Redis (every test mocks RedisService — see the header comment in
      # apps/api/test/health.controller.test.ts), so the REDIS_URL the test
      # step sets had nothing listening on 6379. The QueueModule smoke test
      # (apps/api/test/queue.module.test.ts, ADR-0029 T1) needs a real Redis
      # for its enqueue -> process -> graceful-drain proof, so we provision
      # one here. Image and health-check mirror docker-compose.yml's redis
      # service (redis:7-alpine, redis-cli ping) so CI and local dev agree.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        # Version is inherited from the root package.json `packageManager`
        # field; pnpm/action-setup@v4 fails if both are specified, even when
        # they match.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        # Required so apps/api typechecks against the generated client.
        # @prisma/client's postinstall script doesn't always rebuild on CI
        # when pnpm sees the package as already-built in its content-
        # addressable store (cached across runs via setup-node's `cache: pnpm`).
        # An explicit generate is cheap and guarantees the client exists.
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: pnpm --filter @fleetco/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Prisma schema validate
        # Schema references env("DATABASE_URL"); validate only parses the
        # schema and doesn't connect, but Prisma may still surface a warning
        # if the env is absent. Set a placeholder to keep output clean.
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: pnpm --filter @fleetco/api exec prisma validate

      - name: API tests (Vitest, NestJS unit + integration)
        # Vitest's global-setup hook (apps/api/test/global-setup.ts) runs
        # `prisma migrate deploy` against this DATABASE_URL on the first
        # invocation, so a separate migrate step is not needed. Env vars
        # below match ADR-0023 §6's CI defaults; vitest.config.ts's
        # test.env block consumes them via the same fallback chain that
        # local dev uses.
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://fleetco:fleetco@localhost:5432/fleetco_test?schema=public
          REDIS_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: ci-test-secret-32-bytes-minimum-aaaa
          BETTER_AUTH_URL: http://localhost:3001
          CORS_ORIGIN: http://localhost:3000
          LOG_LEVEL: fatal
        run: pnpm --filter @fleetco/api test

      - name: Web tests (Vitest, includes design-token-drift)
        run: pnpm --filter @fleetco/web test

  mobile:
    name: driver app — lint + typecheck + test
    runs-on: ubuntu-latest
    # The driver mobile app (apps-mobile/driver) is a standalone Expo
    # sub-project OUTSIDE the pnpm workspace (ADR-0033), so it has its own
    # lockfile and installs with --ignore-workspace; the `ci` job above (a
    # workspace `pnpm install`) never touches it. This is the network-free,
    # binary-free gate ADR-0033 commitment 4 specifies — typecheck + lint +
    # jest-expo only. The device build (EAS / `expo prebuild`) is deferred and
    # operator-led (ADR-0033 c7), never run in the polled gate. Node 22 matches
    # the app's `engines` (>=20) and the version the scaffold was verified on.
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps-mobile/driver/pnpm-lock.yaml

      - name: Install (standalone, frozen lockfile)
        working-directory: apps-mobile/driver
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Typecheck
        working-directory: apps-mobile/driver
        run: pnpm typecheck

      - name: Lint
        working-directory: apps-mobile/driver
        run: pnpm lint

      - name: Test (jest-expo)
        working-directory: apps-mobile/driver
        run: pnpm test

  build-images:
    name: docker build — ${{ matrix.app }} (no push)
    runs-on: ubuntu-latest
    # ADR-0014 §7: build the production api + web images on every PR so a broken
    # Dockerfile reds the PR. The existing ci/mobile jobs run the TypeScript
    # suites and never exercise the Dockerfiles, compose, or shell — this job is
    # what makes the green-before-merge gate meaningful for those non-TS
    # artifacts (the api Dockerfile in particular carries the migrate + seed
    # tooling the deploy runbook assumes).
    #
    # T1 builds ONLY — no registry push. The GHCR push + CycloneDX SBOM
    # (ADR-0012 component 5) land in T3. Plain `docker build` with BuildKit
    # (preinstalled on the runner) keeps this job free of any unpinned
    # third-party action (ADR-0012 component 4 — action SHA pinning); only the
    # already-SHA-pinned actions/checkout runs here. Each image builds with the
    # repo root as context (the apps are pnpm-workspace members).
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build ${{ matrix.app }} image
        run: docker build -f apps/${{ matrix.app }}/Dockerfile -t fleetco-${{ matrix.app }}:${{ github.sha }} .

  push-images:
    name: push image to GHCR + CycloneDX SBOM — ${{ matrix.app }}
    runs-on: ubuntu-latest
    # ADR-0014 §7 (deploy-prep T3): on a merge to `main` ONLY, build each
    # production image, generate a CycloneDX SBOM for it, and push it to GHCR
    # tagged by the commit SHA. This makes docs/runbook/deploy.md's routine-deploy
    # step 1 ("Confirm CI built the target <sha> images to GHCR") real and gives
    # the T2 docker-compose.prod.yml something to pull
    # (ghcr.io/<owner>/fleetco-{api,web}:${IMAGE_TAG}). It also lands the one
    # ADR-0012 security-baseline item still deferred — component 5, the CycloneDX
    # SBOM (see the now-updated note in .github/workflows/security.yml).
    #
    # PUSH-ON-MAIN ONLY, by design. The `if: github.event_name == 'push'` guard
    # means this job never runs on a pull_request, so a GHCR/registry hiccup can
    # never red a required PR check or block the merge gate. The PR-time
    # `build-images` job above stays build-only and is the required Dockerfile
    # gate; this job is the publish step that runs AFTER merge, consistent with
    # the loop's merge-then-CI-on-main flow. The two jobs build independently (no
    # built image is shared between GitHub Actions jobs) — a deliberate, accepted
    # redundant build on `main`, the price of keeping the required PR gate free of
    # any registry dependency. A genuinely failed push (vs. a transient hiccup the
    # retry below absorbs) surfaces as a red `main` check so the operator learns
    # the <sha> image never reached GHCR; it cannot affect any PR's required
    # checks (push-images never runs on PRs, and nothing `needs` it).
    #
    # Auth is the automatic GITHUB_TOKEN (no operator secret) with a job-scoped
    # packages:write; the default contents:read is kept. Third-party actions are
    # SHA-pinned with a `# vX` comment (ADR-0012 component 4); docker
    # login/build/push stay action-light (raw docker), as T1/T2 did.
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    env:
      DOCKER_BUILDKIT: "1"
      APP: ${{ matrix.app }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/fleetco-${{ matrix.app }}
      TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build ${{ matrix.app }} image
        # The web image inlines NEXT_PUBLIC_* into its browser bundle at BUILD
        # time (apps/web/Dockerfile), so the public origin must be passed as a
        # build-arg now (the T1 Dockerfile anticipated this). The operator sets the
        # repository variable NEXT_PUBLIC_API_URL to the public origin (ADR-0014 §2
        # same-origin, e.g. https://app.fleetco.example); the API URL is public by
        # design (it ships in the client bundle) so it is a repo *variable*, not a
        # secret. When unset the expression falls back to the Dockerfile's own
        # default so the build still succeeds. The api Dockerfile has no such arg,
        # so the arg is passed for `web` only (avoids an unconsumed-build-arg
        # warning on the api build).
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}
        run: |
          build_args=()
          if [ "${APP}" = "web" ]; then
            build_args+=(--build-arg "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}")
          fi
          docker build \
            -f "apps/${APP}/Dockerfile" \
            "${build_args[@]}" \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            .

      - name: Generate CycloneDX SBOM (${{ matrix.app }})
        # ADR-0012 component 5: a CycloneDX SBOM per production image. Syft scans
        # the image just built in the local docker daemon (no push needed yet), so
        # the SBOM is captured even if the push below fails. anchore/sbom-action is
        # SHA-pinned (ADR-0012 c4); its own bundled artifact upload is disabled so
        # the SBOM is uploaded via the SHA-pinned actions/upload-artifact step.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/fleetco-${{ matrix.app }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.app }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Verify SBOM is CycloneDX
        # ADR-0012 mandates CycloneDX specifically (not SPDX). Fail loudly if the
        # generator emitted the wrong format or an empty file.
        run: |
          test -s "sbom-${APP}.cdx.json"
          grep -q '"bomFormat"[[:space:]]*:[[:space:]]*"CycloneDX"' "sbom-${APP}.cdx.json"

      - name: Upload SBOM artifact (${{ matrix.app }})
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.app }}-${{ github.sha }}
          path: sbom-${{ matrix.app }}.cdx.json
          if-no-files-found: error

      - name: Log in to GHCR
        # Automatic GITHUB_TOKEN + job-scoped packages:write — no operator secret.
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

      - name: Push ${{ matrix.app }} image to GHCR
        # Retry so a transient registry hiccup self-heals rather than reding
        # `main`. A persistent failure still surfaces (deploy.md step 1 depends on
        # the <sha> image being in GHCR). This never runs on PRs, so a push failure
        # can never block a merge.
        run: |
          for attempt in 1 2 3; do
            if docker push "${IMAGE}:${TAG}" && docker push "${IMAGE}:latest"; then
              echo "push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "push attempt ${attempt} failed; retrying in $((attempt * 10))s"
            sleep "$((attempt * 10))"
          done
          echo "::error::docker push to ${IMAGE} failed after 3 attempts"
          exit 1

  deploy-config:
    name: validate prod compose + Caddyfile
    runs-on: ubuntu-latest
    # ADR-0014 §1–§4 (T2): the production Compose project + Caddyfile + env
    # template (docker-compose.prod.yml, Caddyfile, .env.production.example) are
    # never exercised by the TypeScript suites, so this job is what makes the
    # green-before-merge gate meaningful for them — a broken compose file or
    # Caddyfile reds the PR. Like build-images it relies only on the official
    # docker tooling preinstalled on the runner and the already-SHA-pinned
    # actions/checkout (ADR-0012 component 4); `caddy` runs from its official
    # image (an image, not an unpinned third-party action).
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate docker-compose.prod.yml
        # `config` parses + interpolates the file. A throwaway .env supplies the
        # ${IMAGE_TAG} / ${POSTGRES_*} / ${PUBLIC_DOMAIN} interpolation vars (and
        # is the env_file the services reference); the placeholder values need
        # not be real for a parse-only check.
        run: |
          cp .env.production.example .env
          docker compose -f docker-compose.prod.yml config --quiet

      - name: Validate Caddyfile
        # caddy validate via the official image. Its ENTRYPOINT is null (caddy is
        # the first CMD arg), so the `caddy` argv0 is passed explicitly.
        # PUBLIC_DOMAIN is required for the {$PUBLIC_DOMAIN} site-address
        # substitution to resolve.
        run: |
          docker run --rm \
            -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -e PUBLIC_DOMAIN=app.fleetco.example \
            caddy:2-alpine \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

      - name: Shellcheck deploy scripts
        # ADR-0014 §7 (T4): the committed deploy/*.sh helpers (smoke.sh today) are
        # shell, never exercised by the TypeScript suites, so a broken one must red
        # the PR — this is what makes the green-before-merge gate meaningful for
        # them. shellcheck is preinstalled on ubuntu-latest; no third-party action,
        # no secret. The deploy workflow itself (.github/workflows/deploy.yml) is
        # workflow_dispatch-only and needs a live VPS + operator-provisioned secrets
        # to run, so it is validated to actionlint/lint level (a real deploy cannot
        # be exercised in CI — that is expected and documented in docs/runbook/deploy.md).
        run: shellcheck deploy/*.sh
